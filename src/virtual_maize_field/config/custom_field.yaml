# ============================================================================
# Custom Corn Field Configuration
# ============================================================================
# Edit this file and re-run the generate + launch script to see changes.
# Only include parameters you want to override — defaults apply for the rest.
#
# Usage:
#   ros2 run virtual_maize_field generate_world custom_field
#   ros2 launch virtual_maize_field simulation.launch.py
#
# Or use the convenience script:
#   bash ~/het_project/next_gen_lab/sim_corn_fields/run_field.sh
# ============================================================================

# --- Field Layout -----------------------------------------------------------
row_length: 12.0 # Length of each row (meters)
rows_count: 6 # Number of crop rows
row_width: 0.75 # Spacing between rows (meters)

# --- Row Shape --------------------------------------------------------------
# Available segment types: straight, curved, sincurved, island
# Mix and match — the generator chains segments randomly from this list.
row_segments:
  - straight

rows_curve_budget: 1.5708 # Max total curvature in radians (pi/2 = 90 degrees)

# Straight segment length range (meters)
row_segment_straight_length_min: 0.5
row_segment_straight_length_max: 1.0

# Sinusoidal curve offset range (meters, lateral displacement)
row_segment_sincurved_offset_min: 0.5
row_segment_sincurved_offset_max: 1.5

# Sinusoidal curve length range (meters)
row_segment_sincurved_length_min: 3.0
row_segment_sincurved_length_max: 5.0

# Curved segment radius range (meters)
row_segment_curved_radius_min: 3.0
row_segment_curved_radius_max: 10.0

# Curved segment arc range (radians)
row_segment_curved_arc_measure_min: 0.3
row_segment_curved_arc_measure_max: 1.0

# Island radius range (meters)
row_segment_island_radius_min: 1.0
row_segment_island_radius_max: 3.0

# --- Ground / Terrain -------------------------------------------------------
ground_resolution: 0.02 # Heightmap resolution (meters per pixel)
ground_elevation_max: 0.2 # Max ground elevation variation (meters)
ground_headland: 2.0 # Flat area around the field (meters)
ground_ditch_depth: 0.3 # Depth of ditches at field edges (meters)

# --- Plant Properties -------------------------------------------------------
plant_spacing_min: 0.13 # Min spacing between plants in a row (meters)
plant_spacing_max: 0.19 # Max spacing between plants in a row (meters)
plant_height_min: 0.3 # Min plant height (meters)
plant_height_max: 0.6 # Max plant height (meters)
plant_radius: 0.3 # Plant collision radius (meters)
plant_radius_noise: 0.05 # Random variation in plant radius (meters)
plant_placement_error_max: 0.02 # Max lateral placement error (meters)
plant_mass: 0.3 # Mass of each plant (kg)

# --- Holes / Gaps in Rows ---------------------------------------------------
# Probability of a gap starting at each plant position (per row).
# Use a single value for all rows, or a list with one value per row.
hole_prob: [0.06, 0.06, 0.04, 0.04, 0.0, 0.0]

# Max hole size in number of plants (per row).
hole_size_max: [7, 5, 5, 3, 0, 0]

# --- Crop Types --------------------------------------------------------------
# Available: maize_01, maize_02
crop_types:
  - maize_01
  - maize_02

# --- Weeds -------------------------------------------------------------------
# Number of weeds scattered in the field. Set 0 to disable.
# Available types: nettle, unknown_weed, dandelion
weeds: 0
weed_types:
  - nettle
  - unknown_weed
  - dandelion

# --- Litter / Obstacles ------------------------------------------------------
# Number of litter objects in the field. Set 0 to disable.
# Available types: ale, beer, coke_can, retro_pepsi_can
litters: 0
litter_types:
  - ale
  - beer
  - coke_can
  - retro_pepsi_can

# --- Special Objects ---------------------------------------------------------
ghost_objects: false # true = objects have no collision (for vision-only tasks)
location_markers: false # true = place A/B marker poles in the field

# --- Reproducibility ---------------------------------------------------------
seed: -1 # Random seed (-1 = use current time, or set a fixed number)
